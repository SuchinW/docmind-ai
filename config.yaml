# DocMind AI Configuration

llm:
  provider: openai          # openai, anthropic, google
  model: gpt-4o-mini        # Model name
  temperature: 0            # 0 = deterministic, 1 = creative

embeddings:
  model: text-embedding-3-small

chunking:
  chunk_size: 1000
  chunk_overlap: 200

retrieval:
  top_k: 4
  search_type: hybrid       # similarity, mmr, hybrid

vector_store:
  persist_directory: ./data/vector_store

evaluation:
  sample_docs_dir: ./data/sample_docs
  testset_path: ./eval/testset/testset.json
  num_questions: 10
  wandb_project: docmind-eval
  methods:
    - similarity
    - mmr
    - hybrid
    - rerank
    - multi_query
    - contextual_compression
    - parent_document
